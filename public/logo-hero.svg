<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" fill="none">
  <!-- Background with modern gradient -->
  <rect width="200" height="120" rx="24" fill="url(#heroGrad)"/>
  
  <!-- Large Mermaid Character -->
  <!-- Hair -->
  <ellipse cx="100" cy="35" rx="35" ry="28" fill="#00D4AA"/>
  <path d="M65 35c0-15 15-28 35-28s35 13 35 28c0 7-4 14-12 16-8 2-15 1-23 1s-15-1-23-1c-8-2-12-9-12-16z" fill="#00B894"/>
  
  <!-- Face -->
  <circle cx="100" cy="45" r="22" fill="#FDBCB4"/>
  
  <!-- Eyes -->
  <ellipse cx="90" cy="40" rx="2.5" ry="5" fill="#2D3748"/>
  <ellipse cx="110" cy="40" rx="2.5" ry="5" fill="#2D3748"/>
  
  <!-- Mouth -->
  <path d="M95 52c2.5 3 5 3 7.5 0" stroke="#2D3748" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Cheeks -->
  <circle cx="78" cy="48" r="4" fill="#FF6B9D" opacity="0.6"/>
  <circle cx="122" cy="48" r="4" fill="#FF6B9D" opacity="0.6"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="78" rx="18" ry="12" fill="#FF6B9D"/>
  
  <!-- Tail -->
  <ellipse cx="100" cy="100" rx="22" ry="8" fill="#FFD93D"/>
  <path d="M122 100c8 0 10 3 9 7s-6 3-13 0" fill="#FFD93D"/>
  
  <!-- Text overlay -->
  <text x="40" y="25" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="700" opacity="0.9">
    Mermaid Flow Studio
  </text>
  
  <defs>
    <linearGradient id="heroGrad" x1="0" x2="200" y1="0" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.3" stop-color="#1E293B"/>
      <stop offset="0.7" stop-color="#334155"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
  </defs>
</svg>