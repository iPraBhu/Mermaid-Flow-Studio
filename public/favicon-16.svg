<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!-- Simplified mermaid for tiny favicon -->
  <rect width="16" height="16" rx="4" fill="#0F172A"/>
  
  <!-- Hair -->
  <ellipse cx="8" cy="5" rx="6" ry="4" fill="#00D4AA"/>
  
  <!-- Face -->
  <circle cx="8" cy="7" r="3" fill="#FDBCB4"/>
  
  <!-- Eyes -->
  <circle cx="7" cy="6.5" r="0.5" fill="#2D3748"/>
  <circle cx="9" cy="6.5" r="0.5" fill="#2D3748"/>
  
  <!-- Mouth -->
  <path d="M7.5 7.5c0.5 0.5 1 0.5 1.5 0" stroke="#2D3748" stroke-width="0.5"/>
  
  <!-- Body -->
  <ellipse cx="8" cy="11" rx="2.5" ry="1.5" fill="#FF6B9D"/>
  
  <!-- Tail -->
  <ellipse cx="8" cy="13.5" rx="3" ry="1" fill="#FFD93D"/>
  <path d="M11 13.5c1 0 1.5 0.5 1 1s-1 0.5-2 0" fill="#FFD93D"/>
</svg>