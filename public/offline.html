<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mermaid Flow Studio</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 25%),
          radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.18), transparent 28%),
          #050816;
        color: #f8fafc;
        font-family: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
      }

      main {
        width: min(92vw, 640px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 28px;
        padding: 32px;
        background: rgba(10, 15, 30, 0.78);
        box-shadow: 0 30px 80px -36px rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(14px);
      }

      p {
        color: #9fb0cf;
        line-height: 1.7;
      }

      a {
        color: #7dd3fc;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Mermaid Flow Studio</p>
      <h1>You are offline</h1>
      <p>
        If you opened the studio at least once before, cached assets should still make the app
        usable. If not, reconnect briefly so the app shell can be stored locally.
      </p>
      <p><a href="/">Try loading the studio again</a></p>
    </main>
  </body>
</html>
