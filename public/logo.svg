<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" fill="none">
  <!-- Background with subtle gradient -->
  <rect width="56" height="56" rx="16" fill="url(#grad)"/>
  
  <!-- Simplified Mermaid Design -->
  <!-- Hair -->
  <ellipse cx="28" cy="18" rx="16" ry="12" fill="#00D4AA"/>
  <path d="M12 18c0-6 7-12 16-12s16 6 16 12c0 3-2 6-5 7-3 1-6 1-11 1s-8 0-11-1c-3-1-5-4-5-7z" fill="#00B894"/>
  
  <!-- Face -->
  <circle cx="28" cy="22" r="9" fill="#FDBCB4"/>
  
  <!-- Eyes -->
  <ellipse cx="24.5" cy="20" rx="1" ry="2" fill="#2D3748"/>
  <ellipse cx="31.5" cy="20" rx="1" ry="2" fill="#2D3748"/>
  
  <!-- Mouth -->
  <path d="M26 24.5c1 1 2 1 3 0" stroke="#2D3748" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Body -->
  <ellipse cx="28" cy="37" rx="7" ry="5" fill="#FF6B9D"/>
  
  <!-- Tail -->
  <ellipse cx="28" cy="46" rx="8" ry="3.5" fill="#FFD93D"/>
  <path d="M36 46c3 0 4 1.5 3.5 3s-2.5 1.5-5 0" fill="#FFD93D"/>
  
  <defs>
    <linearGradient id="grad" x1="0" x2="56" y1="0" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
  </defs>
</svg>